openapi: 3.0.2
info:
  title: CddService
  version: "1.0"
servers:
- url: /
paths:
  /connect:
    put:
      operationId: Connect
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectRequestContent"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectResponseContent"
          description: Connect 200 response
  /deprovision:
    put:
      operationId: Deprovision
      parameters:
      - explode: true
        in: query
        name: host_id
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: force
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeprovisionResponseContent"
          description: Deprovision 200 response
  /disconnect:
    put:
      operationId: Disconnect
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisconnectResponseContent"
          description: Disconnect 200 response
  /get_configuration:
    get:
      operationId: GetConfiguration
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConfigurationResponseContent"
          description: GetConfiguration 200 response
  /get_state:
    get:
      operationId: GetConnectionStatus
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionStatusResponseContent"
          description: GetConnectionStatus 200 response
  /register:
    put:
      operationId: Register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequestContent"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponseContent"
          description: Register 200 response
  /report_actual_configuration:
    put:
      operationId: ReportActualConfiguration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportActualConfigurationRequestContent"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportActualConfigurationResponseContent"
          description: ReportActualConfiguration 200 response
  /report_status:
    put:
      operationId: ReportStatus
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportStatusRequestContent"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportStatusResponseContent"
          description: ReportStatus 200 response
